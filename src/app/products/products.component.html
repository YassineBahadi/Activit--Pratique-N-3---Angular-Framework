<div class="p-3">
    <div class="card-body">
    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price</th>
                <th>Selected</th>
                <th>Action</th>
            </tr>
        </thead>
        @if(products){
            <tbody>
            @for(p of products; track p.id){
                <tr>
                    <td>{{p.id}}</td>
                    <td>{{p.name}}</td>
                    <td>{{p.price}}</td>
                    <td>
                        @if(p.selected){
                            <i class="bi bi-check-circle text-success">
                            
                        </i>
                        }
                        @else {
                            <i class="bi bi-x-circle text-danger">
                            
                            </i>
                        }

                    </td>
                    <td>
               <button class="btn btn-outline-danger" (click)="openDeleteModal(p)">
  <i class="bi bi-trash"></i>
</button>
                    </td>
                </tr>
            }
        </tbody>
        }
    </table>
    @if(selectedProduct){
           <div class="modal fade show d-block"  style="background: rgba(0,0,0,0.5);">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Confirmer la suppression</h5>
        <button class="btn-close" (click)="selectedProduct=null"></button>
      </div>

      <div class="modal-body">
        êtes-vous sûr de vouloir supprimer le produit
        <strong>{{ selectedProduct.name }}</strong> ?
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="selectedProduct=null">
          Annuler
        </button>

        <button class="btn btn-danger" (click)="confirmDelete()">
          Oui, supprimer
        </button>
      </div>

    </div>
  </div>
</div>
    }
 
</div>
</div>
